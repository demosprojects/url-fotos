<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subir imagen</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0d;
      --surface: #1a1917;
      --surface2: #242220;
      --border: #2e2c29;
      --accent: #e85d2f;
      --accent2: #f0a500;
      --text: #f0ede8;
      --muted: #7a7570;
      --success: #27ae60;
      --danger: #c0392b;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .card-header {
      padding: 1.1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .card-header-icon {
      width: 32px; height: 32px;
      background: #e85d2f18;
      border: 1px solid #e85d2f44;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .card-body {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Drop Zone */
    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      background: var(--surface2);
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: #e85d2f0a;
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone-icon {
      color: var(--muted);
      margin-bottom: 0.6rem;
      transition: color 0.2s;
    }
    .drop-zone:hover .drop-zone-icon { color: var(--accent); }
    .drop-zone-text {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .drop-zone-text strong { color: var(--text); display: block; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .drop-zone-filename {
      display: none;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
      word-break: break-all;
    }

    /* Botón principal */
    .btn-upload {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.65rem 1rem;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      min-height: 44px;
      letter-spacing: 0.02em;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-upload:hover { opacity: 0.88; }
    .btn-upload:active { transform: scale(0.98); opacity: 0.75; }
    .btn-upload:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* Loading */
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      color: var(--muted);
      font-size: 0.875rem;
      padding: 0.25rem 0;
    }
    .loading.visible { display: flex; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    /* Preview */
    .preview-wrap {
      display: none;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
      background: var(--surface2);
      max-height: 220px;
    }
    .preview-wrap.visible { display: block; }
    .preview-wrap img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    .preview-label {
      position: absolute;
      top: 0.5rem; left: 0.5rem;
      background: rgba(0,0,0,0.65);
      border-radius: 6px;
      padding: 0.2rem 0.5rem;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--success);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
    }

    /* Result block */
    .result-block {
      display: none;
      flex-direction: column;
      gap: 0.6rem;
    }
    .result-block.visible { display: flex; }

    .url-box {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .url-box:focus-within { border-color: var(--accent); }
    .url-text {
      flex: 1;
      padding: 0.55rem 0.75rem;
      font-size: 0.78rem;
      color: var(--text);
      font-family: monospace;
      background: transparent;
      border: none;
      outline: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: text;
      min-width: 0;
    }

    .btn-copy {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 0.85rem;
      background: var(--surface);
      border: none;
      border-left: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      min-height: 38px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { background: var(--border); }
    .btn-copy.copied { color: var(--success); }

    .copy-message {
      display: none;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--success);
      padding: 0.1rem 0;
    }
    .copy-message.visible { display: flex; }

    /* Error */
    .error-msg {
      display: none;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 0.85rem;
      background: #c0392b18;
      border: 1px solid #c0392b44;
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--danger);
    }
    .error-msg.visible { display: flex; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="card-header-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <span class="card-title">Servidor de Imágenes</span>
  </div>

  <div class="card-body">

    <!-- Drop zone -->
    <div class="drop-zone" id="dropZone">
      <input type="file" id="imageInput" accept="image/*">
      <div class="drop-zone-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <div class="drop-zone-text">
        <strong>Seleccioná o arrastrá una imagen</strong>
        JPG, PNG, WebP, GIF — se convierte a WebP automáticamente
      </div>
      <div class="drop-zone-filename" id="filename"></div>
    </div>

    <!-- Botón subir -->
    <button class="btn-upload" id="btnUpload" onclick="convertAndUpload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Subir imagen
    </button>

    <!-- Loading -->
    <div class="loading" id="loading">
      <svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
      Subiendo imagen...
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">Error al subir la imagen.</span>
    </div>

    <!-- Preview -->
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="Preview">
      <span class="preview-label">✓ Subida</span>
    </div>

    <!-- Resultado -->
    <div class="result-block" id="resultBlock">
      <div class="url-box">
        <input class="url-text" id="urlText" type="text" readonly>
        <button class="btn-copy" id="copyBtn" onclick="copyLink()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copiar
        </button>
      </div>
      <div class="copy-message" id="copyMessage">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        ¡Link copiado al portapapeles!
      </div>
    </div>

  </div>
</div>

<script>
  'use strict';
  let currentLink = '';

  // ── Drag & Drop ──
  const dropZone = document.getElementById('dropZone');
  const imageInput = document.getElementById('imageInput');
  const filenameEl = document.getElementById('filename');

  imageInput.addEventListener('change', () => {
    if (imageInput.files[0]) showFilename(imageInput.files[0].name);
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const dt = new DataTransfer();
      dt.items.add(file);
      imageInput.files = dt.files;
      showFilename(file.name);
    }
  });

  function showFilename(name) {
    filenameEl.textContent = '📎 ' + name;
    filenameEl.style.display = 'block';
  }

  // ── Reset UI ──
  function resetUI() {
    document.getElementById('previewWrap').classList.remove('visible');
    document.getElementById('resultBlock').classList.remove('visible');
    document.getElementById('copyMessage').classList.remove('visible');
    document.getElementById('errorMsg').classList.remove('visible');
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('copyBtn').classList.remove('copied');
    currentLink = '';
  }

  // ── Upload ──
  function convertAndUpload() {
    const file = imageInput.files[0];
    if (!file) {
      showError('Seleccioná una imagen primero.');
      return;
    }

    resetUI();
    setLoading(true);

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(event) {
      const img = new Image();
      img.src = event.target.result;
      img.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        canvas.toBlob(function(blob) {
          const formData = new FormData();
          formData.append('file', blob, 'image.webp');
          formData.append('upload_preset', 'uploads');

          fetch('https://api.cloudinary.com/v1_1/dl2tftoum/image/upload', {
            method: 'POST',
            body: formData
          })
          .then(res => res.json())
          .then(result => {
            setLoading(false);
            if (result.secure_url) {
              currentLink = result.secure_url;
              document.getElementById('previewImg').src = currentLink;
              document.getElementById('previewWrap').classList.add('visible');
              document.getElementById('urlText').value = currentLink;
              document.getElementById('resultBlock').classList.add('visible');
            } else {
              showError('Error al subir la imagen. Intentá de nuevo.');
              console.error(result);
            }
          })
          .catch(err => {
            setLoading(false);
            showError('Error de red. Verificá tu conexión.');
            console.error(err);
          });
        }, 'image/webp', 0.82);
      };
    };
  }

  function setLoading(on) {
    const btn = document.getElementById('btnUpload');
    const loading = document.getElementById('loading');
    btn.disabled = on;
    if (on) loading.classList.add('visible');
    else loading.classList.remove('visible');
  }

  function showError(msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('errorMsg').classList.add('visible');
  }

  // ── Copiar link ──
  // Estrategia multicapa para funcionar dentro de iframes sin permisos de clipboard
  function copyLink() {
    if (!currentLink) return;

    // 1. Intentar postMessage al padre (funciona en iframe dentro del admin)
    try {
      window.parent.postMessage({ type: 'COPY_TO_CLIPBOARD', text: currentLink }, '*');
    } catch(e) {}

    // 2. Intentar clipboard API moderna
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(currentLink)
        .then(() => showCopied())
        .catch(() => fallbackCopy());
      return;
    }

    // 3. Fallback: execCommand (funciona en casi todos los contextos iframe)
    fallbackCopy();
  }

  function fallbackCopy() {
    const input = document.getElementById('urlText');
    input.select();
    input.setSelectionRange(0, 99999);
    try {
      const ok = document.execCommand('copy');
      if (ok) showCopied();
      else showError('No se pudo copiar. Copiá el link manualmente.');
    } catch(e) {
      showError('No se pudo copiar. Copiá el link manualmente.');
    }
  }

  function showCopied() {
    const btn = document.getElementById('copyBtn');
    const msg = document.getElementById('copyMessage');
    btn.classList.add('copied');
    msg.classList.add('visible');
    setTimeout(() => {
      btn.classList.remove('copied');
      msg.classList.remove('visible');
    }, 2500);
  }

  // ── Listener: el padre puede pedirle el link ──
  window.addEventListener('message', e => {
    if (e.data && e.data.type === 'GET_CURRENT_LINK' && currentLink) {
      e.source.postMessage({ type: 'CURRENT_LINK', text: currentLink }, '*');
    }
  });
</script>

</body>
</html>
