<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Extraer últimos 7 dígitos</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-lg rounded-2xl p-6 w-full max-w-md text-center">
    
    <h2 class="text-2xl font-bold text-gray-800 mb-4">
      Extraer últimos 7 dígitos
    </h2>

    <input 
      type="text" 
      id="codigo" 
      placeholder="Ej: 8CMML11B2S2065316"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4"
    >

    <button 
      onclick="extraer()"
      class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition mb-3"
    >
      Extraer
    </button>

    <p id="resultado" class="text-gray-700 font-medium mb-4"></p>

    <button 
      id="copiarBtn"
      onclick="copiar()"
      class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 rounded-lg transition hidden"
    >
      Copiar
    </button>

    <p id="mensaje" class="text-sm text-green-600 mt-2"></p>

  </div>

  <script>
    let valorExtraido = "";

    function extraer() {
      let codigo = document.getElementById("codigo").value.trim();

      if (codigo.length < 7) {
        document.getElementById("resultado").innerText = "El código es demasiado corto.";
        document.getElementById("copiarBtn").classList.add("hidden");
        return;
      }

      valorExtraido = codigo.slice(-7);

      document.getElementById("resultado").innerText = "Últimos 7 dígitos: " + valorExtraido;
      document.getElementById("copiarBtn").classList.remove("hidden");
      document.getElementById("mensaje").innerText = "";
    }

    function copiar() {
      if (!valorExtraido) return;

      navigator.clipboard.writeText(valorExtraido).then(() => {
        document.getElementById("mensaje").innerText = "Copiado al portapapeles ✅";
      });
    }
  </script>

</body>
</html>
